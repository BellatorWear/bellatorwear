<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bellator Wear | Nr.1 Collection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-white">

  <section class="hero flex items-center justify-center relative">
    <!-- Dein Graffiti-Bild mit Parallax -->
    <div id="background"></div>

    <div class="max-w-5xl mx-auto text-center px-6 py-20 relative z-10">
      
      <img src="logo.png" alt="Bellator Wear" class="mx-auto mb-8 w-36 drop-shadow-2xl">

      <h1 class="title-font text-7xl md:text-8xl tracking-tighter text-white mb-2">BELLATOR</h1>
      <p class="title-font text-6xl md:text-7xl text-red-500 -mt-4 mb-8">WEAR</p>

      <p class="text-4xl md:text-5xl font-medium text-blue-400 mb-12">NR.1 COLLECTION</p>

      <!-- Haupt Shirt -->
      <div class="max-w-md mx-auto mb-12">
        <img src="back.png" alt="Bellator Backprint" class="rounded-3xl shadow-2xl border-4 border-red-500">
      </div>

      <p class="text-2xl max-w-lg mx-auto mb-10 text-gray-100">
        Streetwear mit Attitude.<br>
        <span class="text-white">Build Different. Leave Impact.</span>
      </p>

      <!-- Countdown -->
      <div class="mb-12">
        <p class="uppercase tracking-widest text-red-400 text-sm mb-3">DROP STARTET AM 1. JULI 2026</p>
        <div id="countdown" class="text-5xl md:text-6xl flex justify-center gap-8 font-bold"></div>
      </div>

      <!-- Vorbestell Button -->
      <div class="inline-block mb-16">
        <button onclick="alert('Vorbestellung startet am 1. Juli 2026 🔥 Du wirst benachrichtigt!')" 
                class="bg-red-600 hover:bg-white hover:text-red-600 text-white font-bold px-20 py-8 text-3xl rounded-2xl border-4 border-white transition-all duration-300">
          JETZT VORBESTELLEN
        </button>
      </div>

      <div class="grid grid-cols-2 gap-6 max-w-lg mx-auto">
        <img src="front.png" class="rounded-2xl border border-gray-700">
        <img src="back.png" class="rounded-2xl border border-gray-700">
      </div>

      <div class="mt-20 text-gray-400 text-sm">
        EST. 2026 • UNCONQUERED STREETWEAR
      </div>
    </div>
  </section>

  <script>
    // Parallax Effekt
    document.addEventListener('mousemove', (e) => {
      const bg = document.getElementById('background');
      const x = (e.clientX / window.innerWidth) * 30 - 15;
      const y = (e.clientY / window.innerHeight) * 30 - 15;
      bg.style.transform = `translate(${x}px, ${y}px)`;
    });

    // Countdown
    function startCountdown() {
      const dropDate = new Date("2026-07-01T00:00:00").getTime();
      function update() {
        const distance = dropDate - new Date().getTime();
        if (distance < 0) {
          document.getElementById("countdown").innerHTML = `<span class="text-green-400">DROP IST DA!</span>`;
          return;
        }
        const days = Math.floor(distance / (1000*60*60*24));
        const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
        const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));

        document.getElementById("countdown").innerHTML = `
          <div><span class="text-6xl">${days}</span><br><span class="text-xs">TAGE</span></div>
          <div><span class="text-6xl">${hours}</span><br><span class="text-xs">STD</span></div>
          <div><span class="text-6xl">${minutes}</span><br><span class="text-xs">MIN</span></div>
        `;
      }
      update();
      setInterval(update, 60000);
    }
    startCountdown();
  </script>
</body>
</html>
