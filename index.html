<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bellator Wear | Nr.1 Collection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      cursor: url('https://i.ibb.co.com/0jKzL8P/spray-can-cursor.png') 16 30, auto;
    }
    .hero {
      position: relative;
      min-height: 100vh;
    }
    #background {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      background-image: url('backround_web.jpg');
      background-size: cover;
      background-position: center;
      z-index: -1;
      transition: transform 0.15s ease-out;
    }
  </style>
</head>
<body class="bg-black text-white">

  <section class="hero flex items-center justify-center relative">
    <div id="background"></div>

    <div class="max-w-5xl mx-auto text-center px-6 py-20 relative z-10">
      <img src="logo.png" alt="Bellator Wear" class="mx-auto mb-8 w-40">

      <h1 class="text-7xl md:text-8xl font-black tracking-tighter text-white mb-1">BELLATOR</h1>
      <p class="text-6xl md:text-7xl font-black text-red-500 -mt-4 mb-10">WEAR</p>

      <p class="text-4xl md:text-5xl text-blue-400 mb-12">NR.1 COLLECTION</p>

      <div class="max-w-md mx-auto mb-12">
        <img src="back.png" class="rounded-3xl shadow-2xl border-4 border-red-500">
      </div>

      <p class="text-2xl mb-12">Build Different. Move Silent. Leave Impact.</p>

      <div class="mb-12">
        <p class="text-red-400 text-sm mb-2">DROP AM 1. JULI 2026</p>
        <div id="countdown" class="text-5xl font-bold flex justify-center gap-8"></div>
      </div>

      <button onclick="alert('Vorbestellung startet am 1. Juli!')" 
              class="bg-red-600 hover:bg-white hover:text-red-600 px-16 py-8 text-3xl font-bold rounded-2xl border-4 border-white">
        JETZT VORBESTELLEN
      </button>
    </div>
  </section>

  <script>
    // Parallax
    document.addEventListener('mousemove', (e) => {
      const bg = document.getElementById('background');
      const x = (e.clientX / window.innerWidth) * 40 - 20;
      const y = (e.clientY / window.innerHeight) * 40 - 20;
      bg.style.transform = `translate(${x}px, ${y}px)`;
    });

    // Countdown
    function countdown() {
      const drop = new Date("2026-07-01T00:00:00").getTime();
      const now = new Date().getTime();
      const diff = drop - now;

      if (diff < 0) {
        document.getElementById("countdown").innerHTML = "DROP IST DA!";
        return;
      }

      const days = Math.floor(diff / (1000*60*60*24));
      const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
      const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));

      document.getElementById("countdown").innerHTML = `
        <div>${days}<span class="text-sm block">TAGE</span></div>
        <div>${hours}<span class="text-sm block">STD</span></div>
        <div>${minutes}<span class="text-sm block">MIN</span></div>
      `;
    }
    setInterval(countdown, 60000);
    countdown();
  </script>
</body>
</html>
