<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bellator Wear | Nr.1 Collection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-white overflow-x-hidden">

  <section class="hero min-h-screen flex items-center justify-center relative" 
           style="background: linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.95)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a9c?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover fixed;">

    <div class="max-w-6xl mx-auto text-center px-6 py-20">
      
      <!-- Kleines Logo -->
      <img src="logo.png" alt="Bellator Logo" class="mx-auto mb-8 w-28">

      <!-- Haupt Graffiti -->
      <h1 class="graffiti graffiti-white text-7xl md:text-8xl drip">BELLATOR</h1>
      <p class="graffiti graffiti-red text-6xl md:text-7xl drip">WEAR</p>

      <!-- Collection -->
      <p class="graffiti graffiti-blue text-4xl md:text-5xl mt-6 drip">NR.1 COLLECTION</p>

      <p class="text-2xl md:text-3xl max-w-xl mx-auto my-12 text-white/90">
        Build Different.<br>
        Move Silent.<br>
        <span class="text-red-500">Leave Impact.</span>
      </p>

      <button onclick="alert('Dropping Soon 🔥 Der erste Drop kommt bald!')" 
              class="graffiti graffiti-red border-4 border-white hover:bg-white hover:text-red-600 px-16 py-7 text-3xl tracking-widest transition-all">
        DROPPING SOON
      </button>

      <!-- Mockups -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-5xl mx-auto mt-20">
        <div>
          <img src="back.png" alt="Back Print" class="rounded-3xl shadow-2xl border-4 border-red-500 w-full">
          <p class="graffiti graffiti-red mt-4 text-2xl">BACK PRINT</p>
        </div>
        <div>
          <img src="front.png" alt="Front Print" class="rounded-3xl shadow-2xl border-4 border-blue-500 w-full">
          <p class="graffiti graffiti-blue mt-4 text-2xl">CHEST PRINT</p>
        </div>
      </div>

      <div class="mt-20 flex justify-center gap-12 text-5xl">
        <a href="#" class="hover:text-red-500 transition"><i class="fab fa-instagram"></i></a>
        <a href="#" class="hover:text-blue-400 transition"><i class="fab fa-tiktok"></i></a>
      </div>

      <p class="mt-16 text-xs text-gray-500">EST. 2026 • UNCONQUERED</p>
    </div>
  </section>

</body>
</html>
