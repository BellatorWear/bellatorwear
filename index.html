<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bellator Wear | Nr.1 Collection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-white">

  <section class="hero min-h-screen flex items-center justify-center relative">
    <div class="max-w-5xl mx-auto text-center px-6 py-20">
      
      <!-- Logo -->
      <img src="logo.png" alt="Bellator Wear" class="mx-auto mb-8 w-36">

      <!-- Haupt Titel -->
      <h1 class="title-font text-7xl md:text-8xl tracking-tighter mb-2">BELLATOR</h1>
      <p class="title-font text-6xl md:text-7xl text-red-500 -mt-4 mb-8">WEAR</p>

      <p class="text-4xl md:text-5xl font-medium text-blue-400 mb-12">NR.1 COLLECTION</p>

      <!-- Hero Shirt -->
      <div class="max-w-md mx-auto mb-12">
        <img src="back.png" alt="Bellator Backprint" class="rounded-3xl shadow-2xl border border-gray-800">
      </div>

      <p class="text-2xl max-w-lg mx-auto mb-10 text-gray-200">
        Streetwear für Krieger.<br>
        <span class="text-white">Qualität. Attitude. Unbesiegt.</span>
      </p>

      <!-- Countdown -->
      <div class="mb-12">
        <p class="uppercase tracking-widest text-red-400 text-sm mb-3">Der Drop startet am</p>
        <div id="countdown" class="countdown text-5xl md:text-6xl flex justify-center gap-8 text-white"></div>
      </div>

      <!-- Locked Button -->
      <div class="locked inline-block mb-16">
        <button onclick="alert('Vorbestellung startet am 1. Juli 2026 🔥 Du wirst benachrichtigt!')" 
                class="bg-white text-black font-bold px-16 py-8 text-2xl rounded-2xl border-4 border-red-600 hover:scale-105 transition-all duration-300">
          JETZT VORBESTELLEN
        </button>
      </div>

      <!-- Mockups klein darunter -->
      <div class="grid grid-cols-2 gap-6 max-w-lg mx-auto">
        <img src="front.png" alt="Front" class="rounded-2xl border border-gray-700">
        <img src="back.png" alt="Back" class="rounded-2xl border border-gray-700">
      </div>

      <div class="mt-20 text-gray-500 text-sm">
        EST. 2026 • UNCONQUERED STREETWEAR
      </div>
    </div>
  </section>

  <script>
    // Countdown bis 1. Juli 2026
    function startCountdown() {
      const dropDate = new Date("2026-07-01T00:00:00").getTime();

      function update() {
        const now = new Date().getTime();
        const distance = dropDate - now;

        if (distance < 0) {
          document.getElementById("countdown").innerHTML = `<span class="text-green-400">DER DROP IST DA!</span>`;
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

        document.getElementById("countdown").innerHTML = `
          <div class="text-center"><span class="text-6xl">${days}</span><br><span class="text-xs tracking-widest">TAGE</span></div>
          <div class="text-center"><span class="text-6xl">${hours}</span><br><span class="text-xs tracking-widest">STD</span></div>
          <div class="text-center"><span class="text-6xl">${minutes}</span><br><span class="text-xs tracking-widest">MIN</span></div>
        `;
      }

      update();
      setInterval(update, 60000);
    }

    startCountdown();
  </script>

</body>
</html>
